<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body { font-family: Arial; background: #f5f7fa; }
        .box {
            width: 300px; margin: 100px auto;
            padding: 20px; background: white;
            border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        input { width: 90%; padding: 8px; margin: 8px; }
        button { padding: 8px 15px; background: #4CAF50; color: white; border: none; }
        a { display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
<h2>Login</h2>

<form action="login" method="post">
    <input type="text" name="username" placeholder="Username" required><br>
    <input type="password" name="password" placeholder="Password" required><br>
    <button type="submit">Login</button>
</form>

<a href="register.html">New user? Register</a>
<a href="admin.html">Login as Admin</a>

</div>

</body>
</html>
